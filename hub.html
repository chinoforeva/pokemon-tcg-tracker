<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chini Hub</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #06060f; min-height: 100vh; color: #f0f0f5; display: flex; align-items: center; justify-content: center;
    background-image:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(233,69,96,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,212,170,0.04) 0%, transparent 50%);
}
.container { text-align: center; padding: 2rem; max-width: 700px; }
h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 1rem; }
h1 span { background: linear-gradient(135deg, #e94560, #ff6b8a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: rgba(240,240,245,0.5); font-size: 0.95rem; margin-bottom: 3rem; }
.grid { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
.card {
    background: #131330; border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 2.5rem 2rem;
    width: 280px; cursor: pointer; transition: all 0.3s; text-decoration: none; color: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
}
.card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-4px); }
.card.tcg:hover { box-shadow: 0 8px 30px rgba(233,69,96,0.2); border-color: rgba(233,69,96,0.3); }
.card.aram:hover { box-shadow: 0 8px 30px rgba(0,212,170,0.2); border-color: rgba(0,212,170,0.3); }
.icon { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
.icon.tcg { background: linear-gradient(135deg, #e94560, #ff6b8a); box-shadow: 0 4px 15px rgba(233,69,96,0.25); }
.icon.aram { background: linear-gradient(135deg, #00d4aa, #00f5c8); box-shadow: 0 4px 15px rgba(0,212,170,0.25); }
.card h2 { font-size: 1.4rem; font-weight: 700; }
.card p { font-size: 0.82rem; color: rgba(240,240,245,0.5); line-height: 1.5; }
.badge {
    font-size: 0.7rem; padding: 0.25rem 0.75rem; border-radius: 20px; font-weight: 600;
    background: rgba(255,255,255,0.06); color: rgba(240,240,245,0.4);
}
.footer { margin-top: 3rem; font-size: 0.75rem; color: rgba(240,240,245,0.2); }
</style>
</head>
<body>
<div class="container">
    <h1>⚡ <span>Chini</span> Hub</h1>
    <p class="subtitle">Selecciona una aplicación</p>
    <div class="grid">
        <a class="card tcg" href="http://localhost:8080/tcg" target="_blank">
            <div class="icon tcg">🃏</div>
            <h2>TCG Chini</h2>
            <p>Pokémon TCG Tracker — colección, precios y búsqueda de cartas</p>
            <span class="badge">localhost:8080</span>
        </a>
        <a class="card aram" href="http://localhost:3000" target="_blank">
            <div class="icon aram">⚔️</div>
            <h2>Espotifai Arams</h2>
            <p>Estadísticas ARAM de League of Legends — daño, kills, curación</p>
            <span class="badge">localhost:3000</span>
        </a>
    </div>
    <p class="footer">Asegúrate de que ambos servidores estén corriendo antes de abrir</p>
</div>
</body>
</html>
